services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      # EXTERNAL listener — for apps running on the host (Go gateway/producer/consumer)
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Two broker listeners: INTERNAL for containers, EXTERNAL for the host.
      # Host clients dial localhost:9092 and get advertised back localhost:9092;
      # containers dial kafka:29092 and get advertised back kafka:29092.
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # One-shot: declare the app's Kafka topic up front so the Go consumer never
  # joins the group before the topic exists (which leaves it with 0 partitions,
  # permanently consuming nothing). Runs to completion and exits.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists
      --topic usage-events --partitions 1 --replication-factor 1
      && echo 'topic usage-events is ready'"
    restart: "no"

  # ClickHouse is OpenMeter's event store and aggregation engine.
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    # A password is required so the 'default' user keeps network access — without
    # one this image locks 'default' to localhost and OpenMeter can't connect.
    environment:
      CLICKHOUSE_PASSWORD: openmeter
      CLICKHOUSE_DB: openmeter
    # Only OpenMeter (in-network) talks to ClickHouse, so nothing needs to be
    # published to the host. Expose 8123 for optional debugging via curl only.
    ports:
      - "8123:8123"  # HTTP (handy for debugging: curl localhost:8123/ping)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Postgres holds OpenMeter metadata (meters, namespaces).
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: openmeter
      POSTGRES_USER: openmeter
      POSTGRES_PASSWORD: openmeter
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmeter"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OpenMeter API server — receives CloudEvents at /api/v1/events and exposes meters.
  openmeter:
    image: ghcr.io/openmeterio/openmeter:latest  # pin to a release tag for reproducible builds
    command: ["openmeter", "--address", "0.0.0.0:8888", "--config", "/etc/openmeter/config.yaml"]
    ports:
      - "8888:8888"
    volumes:
      - ./config/openmeter/config.yaml:/etc/openmeter/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/api/v1/debug/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenMeter sink-worker — drains events from Kafka into ClickHouse for aggregation.
  sink-worker:
    image: ghcr.io/openmeterio/openmeter:latest
    command: ["openmeter-sink-worker", "--config", "/etc/openmeter/config.yaml"]
    volumes:
      - ./config/openmeter/config.yaml:/etc/openmeter/config.yaml
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      openmeter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiteLLM proxy — the Go gateway forwards chat requests here (localhost:4000).
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in your environment or a .env file}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml

volumes:
  kafka_data:
  clickhouse_data:
  postgres_data:
